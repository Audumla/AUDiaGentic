contract-version: v1
component-id: provider-layer
display-name: Provider Layer
description: AI provider configuration and runtime model catalogs
detection-marker: .audiagentic/components/provider-layer.yaml
files:
  - path: .audiagentic/components/provider-layer.yaml
    lifecycle: create-if-missing
    description: Installation marker
  - path: .audiagentic/config/runtime/providers.yaml
    lifecycle: create-if-missing
    description: Provider configuration — models, access mode, execution policy
  - path: .audiagentic/runtime/providers
    lifecycle: runtime-only
    recursive: true
    description: Runtime provider catalogs and session state
mcp-servers:
  - name: audiagentic-providers
    module: audiagentic.provisioning.mcp.providers_server
    direct-tools: true
    description: Providers MCP server for provider management and introspection
harness-instructions:
  - section: "What you can do"
    content: |
      ### audiagentic-providers
      - `audiagentic_providers_list_providers` — List all known providers
      - `audiagentic_providers_provider_status` — Check a specific provider status
      - `audiagentic_providers_list_provider_models` — List models from a provider's catalog
