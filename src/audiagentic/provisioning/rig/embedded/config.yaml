# Embedded rig config: llama-server/llamafile + Qwen3.5-2B Q4_K_S
# This is the default rig for AUDiaGentic. Goose connects here out of the box.
# To switch to an external rig, set OPENAI_HOST and GOOSE_MODEL in your shell.

# Goose connection (matches llamafile server below)
host: http://127.0.0.1:42001/v1
api_key: dummy
model: qwen3.5-2b

# llamafile launch config
llamafile:
  # Runtime binaries live under .audiagentic/provisioning/rig/embedded/bin/<platform>/
  binary: llama-server
  model_file: Qwen_Qwen3.5-2B-Q4_K_S.gguf
  port: 42001
  host: 127.0.0.1
  context: 32768
  threads: 8
  gpu_layers: 99       # offload all layers; set 0 for CPU-only
  parallel: 2
  telemetry: false
