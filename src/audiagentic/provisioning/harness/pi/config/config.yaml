# Pi harness config for AUDiaGentic.
# Defaults to embedded rig. Override via AUDIAGENTIC_PI_* environment variables.
# Do not place secrets here.

# Active rig: embedded | external
rig: embedded

# Model default. Overridden by AUDIAGENTIC_PI_MODEL env var.
# Provider is resolved from the rig setting; override via AUDIAGENTIC_PI_PROVIDER.
model: Qwen_Qwen3.5-2B-Q4_K_S.gguf

# Smoke test settings.
smoke:
  timeout: 60.0

# --- Pi built-in tool access control ---
#
# allow:      Explicit allowlist of Pi built-in tools. null = Pi defaults (read, bash, edit, write).
#             Available: read, bash, edit, write, grep, find, ls
#             Example:   [read, grep, find, ls]  (read-only set)
# no_builtin: Disable all Pi built-in tools. MCP and extension tools remain active.
#             Use this to force MCP-only operation.
# no_all:     Disable every tool including extensions and MCP. LLM communication only.
#
# Priority: no_all > no_builtin > allow
tools:
  allow: null
  no_builtin: false
  no_all: false

# --- Extension loading ---
#
# no_auto_discovery: Block Pi from auto-loading extensions from the home dir.
#                    Recommended true; use 'load' for explicit controlled extensions.
# load:             Explicit extension paths to load (absolute or relative to pi_agent_dir).
#                   Example: ["/path/to/protected-paths.js", "/path/to/permission-gate.js"]
extensions:
  no_auto_discovery: true
  load: []

# --- MCP integration ---
#
# enabled:          Default MCP state. Also toggled by --enable-mcp CLI flag or
#                   AUDIAGENTIC_PI_ENABLE_MCP=1 env var (any of these enables it).
# extra_server_args: Additional args appended to audiagentic.provisioning.mcp.server.
#                    The template already passes --readonly --smoke-only; add extras here.
#                    Example: [--verbose]
mcp:
  enabled: false
  extra_server_args: []

# --- Sandbox (OS-level filesystem restriction) ---
#
# Pi supports an optional sandbox extension (examples/extensions/sandbox/) that
# uses macOS sandbox-exec or Linux bubblewrap. Requires building the extension
# and adding it to extensions.load above.
#
# enabled:     Load the sandbox extension from the first path in extensions.load
#              that matches a sandbox extension pattern.
# config_path: Path to sandbox.json (absolute or relative to pi_agent_dir).
#              Defines filesystem allow/deny rules and network restrictions.
#              See Pi sandbox extension docs for schema.
sandbox:
  enabled: false
  config_path: null

# Extra Pi CLI flags appended verbatim to every non-smoke invocation.
# Use sparingly; prefer the structured options above.
extra_flags: []

# --- UI customization ---
#
# These values are written into settings.json inside the Pi home on each run.
# See https://github.com/earendil-works/pi-coding-agent/blob/main/docs/settings.md

ui:
  # Base theme: "dark" | "light" | name of a custom theme defined in ui.theme_colors below.
  theme: dark

  # --- Pi built-in header (logo + keybinding hints + changelog) ---
  #
  # quiet_startup: true  = hide Pi's built-in header entirely.
  # collapse_changelog:  = show condensed changelog instead of full after updates.
  # custom_header_extension: path to a .js extension that calls ctx.ui.setHeader() to
  #   replace Pi's header with custom content (ASCII art, branding, etc.).
  #   The extension receives (ui, theme) and must return a TUI component.
  #   Added to extensions.load automatically when set.
  #   Example: "path/to/my-header.js"
  quiet_startup: true
  collapse_changelog: true
  custom_header_extension: null

  # --- Runner startup block ---
  #
  # show_startup_info: print the harness info block (model, endpoint, MCP, etc.) before
  #   launching Pi. Set false for a clean launch with no runner output.
  # startup_banner: optional text printed before Pi starts (supports multiline YAML |).
  #   Printed regardless of show_startup_info so you can silence the info block but keep
  #   a banner. Set null to disable.
  #   Example:
  #     startup_banner: |
  #       ╔══════════════════════════╗
  #       ║   AUDiaGentic  Stage 0   ║
  #       ╚══════════════════════════╝
  show_startup_info: false
  startup_banner: null

  # Hide <think> blocks in the conversation view.
  hide_thinking_block: false

  # Default thinking level: off | minimal | low | medium | high | xhigh
  thinking: off

  # Horizontal padding for the input editor (0–3 characters).
  editor_padding_x: 0

  # --- Footer metrics ---
  # Pi always renders the footer. These control what appears in it via a footer extension.
  # Token counts (↑ input / ↓ output / R cache-read / W cache-write) are always shown.
  show_cost: true          # USD cost ticker
  show_context_pct: true   # context window % used
  show_model: true         # model id / provider label

  # --- Custom theme colors ---
  # Override individual color tokens from the base theme.
  # All 51 tokens are available; only set what you want to change.
  # Values: hex "#RRGGBB", 256-color integer (0-255), or "" for terminal default.
  # See .audiagentic-dev/pi/node/node_modules/@earendil-works/pi-coding-agent/dist/modes/interactive/theme/theme-schema.json
  # for the full token list.
  #
  # Example (change accent + heading color):
  #   accent: "#ff6e27"
  #   mdHeading: "#ff6e27"
  theme_colors: {}
