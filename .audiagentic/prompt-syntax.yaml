contract-version: v1
default-profile: shared
generic-tag: adhoc
tag-aliases:
  p: plan
  i: implement
  r: review
  a: audit
  c: check-in-prep
provider-aliases:
  local-openai: local-openai
  lo: local-openai
  codex: codex
  cx: codex
  claude: claude
  cld: claude
  gemini: gemini
  gm: gemini
  qwen: qwen
  qw: qwen
  copilot: copilot
  cp: copilot
  continue: continue
  ctr: continue
  cline: cline
  cln: cline
directive-aliases:
  agent: provider
  subject: id
  ctx: context
  out: output
  t: template
combined-aliases:
  p-cln: plan provider=cline
  p-cld: plan provider=claude
  p-cx: plan provider=codex
  i-cln: implement provider=cline
  i-cld: implement provider=claude
  i-cx: implement provider=codex
  r-cln: review provider=cline
  r-cld: review provider=claude
  r-cx: review provider=codex
  a-cln: audit provider=cline
  a-cld: audit provider=claude
  a-cx: audit provider=codex
  c-cln: check-in-prep provider=cline
  c-cld: check-in-prep provider=claude
  c-cx: check-in-prep provider=codex
profiles:
  shared:
    prompt-controls:
      id: id
      context: context
      output: output
      template: template
  codex-prompt-tags-v1:
    extends: shared
  claude-prompt-tags-v1:
    extends: shared
  gemini-prompt-tags-v1:
    extends: shared
  copilot-prompt-tags-v1:
    extends: shared
  continue-prompt-tags-v1:
    extends: shared
  cline-prompt-tags-v1:
    extends: shared
  openai-bridge-prompt-tags-v1:
    extends: shared
