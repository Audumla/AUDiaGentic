contract-version: v1
project-id: audiagentic
project-name: AUDiaGentic
workflow-profile: standard
tracked-docs-root: docs
runtime-root: .audiagentic/runtime
release-strategy: release-please
workflow-overrides:
  review:
    enabled: true
  audit:
    enabled: false
prompt-launch:
  syntax: prefix-token-v1
  allow-adhoc-target: false
  default-review-policy:
    required-reviews: 2
    aggregation-rule: all-pass
    require-distinct-reviewers: true
  default-stream-controls:
    enabled: true
    tee-console: true
    capture-stdout: true
    capture-stderr: true
    capture-progress: true
    event-format: ndjson
    timeout-warning-seconds: null
    timeout-seconds: null
    sink-error-policy: warn
    control-validation-policy: normalize
    termination-policy: warn-only
    invalid-event-policy: quarantine
    event-write-policy: locked-append
    event-schema-validation: true
    in-memory-max-bytes: null
    large-output-warning-bytes: null
    overflow-policy: warn-only
    overflow-marker-text: "\n[OUTPUT TRUNCATED]\n"
  default-input-controls:
    enabled: true
    tee-console: true
    capture-stdin: true
    capture-input-events: true
    allow-pause-resume: true
    event-format: ndjson
