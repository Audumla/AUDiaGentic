# Event Registry

Registry of all event types used by the AUDiaGentic interoperability layer.

## Planning Events

### planning.item.state.will-change

State change event fired before state transition.

**Version:** 1  
**Namespace:** planning  
**Triggered by:** manual, automatic

**Subject:**
```yaml
kind: task|wp|plan|spec|request|standard
id: string
```

**Payload:**
```yaml
id: string
old_state: string
new_state: string
reason: string
actor: string
```

**Metadata:**
```yaml
triggered_by: manual|automatic
correlation_id: string
propagation_depth: integer
timestamp: ISO8601
```

### planning.item.state.changed

State change event for planning items.

**Version:** 1  
**Namespace:** planning  
**Triggered by:** manual, automatic

**Subject:**
```yaml
kind: task|wp|plan|spec|request|standard
