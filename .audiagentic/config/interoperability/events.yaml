## Event Lifecycle

1. **Publish**: Component publishes event to EventBus
2. **Dispatch**: EventBus dispatches to matching subscribers
3. **Persist**: Events written to FileEventStore (if enabled)
4. **Replay**: Events replayed on startup (if enabled)
5. **Ack**: Subscriber acknowledges processing

## Event Ordering

- Events are ordered by timestamp within a correlation_id
- ASYNC mode: events may be processed out of order
- SYNC mode: events processed in publish order

## Error Handling

- Subscriber failures logged
- Store write failures trigger retry with exponential backoff
- Bus failures logged but don't block publish
