contract-version: v1
providers:
  local-openai:
    enabled: true
    install-mode: external-configured
    access-mode: none
    base-url: http://localhost:8000/v1
    default-model: qwen-coder
    model-aliases:
      fast: qwen-coder
      balanced: qwen-plus
      deep: qwen-max
      review: qwen-max
      code: qwen-coder
      reasoning: qwen-max
      long: qwen-max
    catalog-refresh:
      source: static
      max-age-hours: 168
    prompt-surface:
      enabled: true
      tag-syntax: prefix-token-v1
      first-line-policy: first-non-empty-line
      cli-mode: bridge-wrapper
      vscode-mode: bridge-wrapper
      settings-profile: openai-bridge-prompt-tags-v1
    execution-policy:
      output-format: json
      permission-mode: auto
      safety-mode: standard
      auto-approve: false
      full-auto: false
      ephemeral: true
      target-type: default
      timeout-seconds: 120
  qwen:
    enabled: true
    install-mode: external-configured
    access-mode: cli
    default-model: qwen-coder
    model-aliases:
      fast: qwen-coder
