hooks:
- id: current-state-doc-change
  kind: file_change
  applies_to:
  - '**/*.md'
  - '**/*.yaml'
  - '**/*.yml'
  eligibility:
    reject_when_path_contains:
    - requests
    - draft
    - proposals
    reject_when_content_contains:
    - DRAFT
    allow_when_content_contains_any:
    - VERIFIED
    - active
    - current
  action: generate_sync_proposal
  note: Conservative default hook policy.
- id: runtime-artifact-change
  kind: runtime_event_stream
  applies_to:
  - '**/*.ndjson'
  - '**/*.json'
  eligibility:
    source_maturity: runtime_current
  action: generate_sync_proposal
  note: Runtime artifacts feed review proposals rather than silent current-state rewrites.
