# Event Handlers Configuration
# 
# NOTE: This is a documentation copy. Runtime config is in .audiagentic/knowledge/events/handlers.yml
# 
# Standard: standard-0013 (Event subscription configuration standard)
# Event protocol: spec-0055 (Interoperability event layer specification)
# 
# This file defines what happens when events are captured by adapters.
# Adapters capture events; handlers define the response.
#
# Handler types:
# - deterministic: Auto-apply changes without review (for safe, predictable updates)
# - review_only: Queue for manual/agent review before applying
# - none: Just capture the event, take no action
#
# Future: Job/agent manager will consume these handlers to assign work

default_handler: deterministic

handlers:
  # Planning state changes - deterministic updates for completed work
  - event_patterns:
      - planning.item.state.changed
      - "*.after_state_change"
    payload_filters:
      in:
        new_state:
          - done
          - verified
    handler: deterministic
    action: mark_stale_and_generate_sync_proposal
    action_args:
      require_review: false
      proposal_mode: deterministic
    priority: 10

  # Work-package review trigger - queue for agent review
  - event_patterns:
      - wp.after_state_change
      - planning.item.state.changed
    payload_filters:
      equals:
        new_state: review
    handler: review_only
    action: generate_sync_proposal
    action_args:
      require_review: true
      proposal_mode: review_only
    priority: 5
    note: |
      Future: Job/agent manager will assign review tasks here
      Currently just generates proposal for manual review

  # Blocked state - mark stale but don't auto-update
  - event_patterns:
      - planning.item.state.changed
      - "*.after_state_change"
    payload_filters:
      equals:
        new_state: blocked
    handler: deterministic
    action: mark_stale
    action_args: {}
    priority: 5

  # Legacy compatibility
  - event_patterns:
      - task.after_state_change
      - spec.after_state_change
      - plan.after_state_change
    payload_filters:
      in:
        new_state:
          - done
          - verified
    handler: deterministic
    action: mark_stale_and_generate_sync_proposal
    action_args:
      require_review: false
      proposal_mode: deterministic
      legacy: true
    priority: 1
