name: release-please

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release_id:
        description: Project release identifier
        required: false
        default: rel_0001

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_id || 'rel_0001' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip pyyaml jsonschema
      - name: Bootstrap release-managed state
        run: python src/audiagentic/cli/main.py release-bootstrap --project-root . --release-id "$RELEASE_ID"
      - name: Verify installed state
        run: python src/audiagentic/cli/main.py providers-status --project-root .
