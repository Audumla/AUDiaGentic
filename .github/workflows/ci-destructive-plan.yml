name: ci-destructive-plan

on:
  workflow_dispatch:

jobs:
  destructive-plan-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest jsonschema pyyaml
      - name: Run destructive plan tests
        run: python -m pytest tests/integration/lifecycle/test_stub.py
