planning:
  automations:
    - name: request-scaffold
      "on":
        event: request.after_create
      do:
        - action: emit_event
        - action: note_stub
          params:
            note: request scaffold created
    - name: spec-ready-validate
      "on":
        event: spec.after_state_change
        to: ready
      do:
        - action: validate
        - action: emit_event
    - name: wp-ready-review-stub
      "on":
        event: wp.after_state_change
        to: ready
      do:
        - action: review_stub
        - action: report_stub
