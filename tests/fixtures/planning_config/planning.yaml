planning:
  convention_version: 1
  default_profile: feature
  default_guidance: standard
  naming:
    # numeric_format: preserve_id means filenames use the ID exactly as stored in frontmatter.
    # New items use raw integers (request-1, spec-5, task-12) — no zero padding.
    # Legacy items retain their original padded IDs (spec-001, task-0001) to avoid collisions.
    # reconcile/maintain renames files to match their frontmatter ID without renumbering.
    numeric_format: preserve_id
    # slug_policy: always means every filename includes a human-readable slug after the ID.
    # canonical pattern: {id}-{slug}.md  e.g. request-31-reconcile-filename-conventions.md
    slug_policy: always
    default_pattern: "{id}-{slug}.md"
  kind_aliases:
    req: request
    specification: spec
    sp: spec
    pl: plan
    ta: task
    work-package: wp
    work_package: wp
  
  # Config-driven kind definitions - add new kinds here without code changes
  kinds:
    request:
      dir: requests
      id_prefix: request
      counter_file: requests.json
      has_domain: false
      required_refs: []
      reference_inheritance: {}
      creation:
        duplicate_check: true
        require_source: true
        validate_request_refs: false
        refinement_source_prefix: refinement-of-
        seed_reference_fields:
          spec_refs: request_refs
        extra_fields:
          use_profile_defaults: true
          use_guidance_defaults: true
          source_field: source
          guidance_field: guidance
          context_field: context
          understanding_field: current_understanding
          open_questions_field: open_questions
          meta_field: meta
      state_cascades:
        archived:
          spec: archived
          task: archived
        superseded:
          spec: superseded
      required_fields: [id, label, state, summary]
      optional_fields: [profile, source, context, current_understanding, open_questions, guidance, spec_refs, standard_refs, meta, deleted, deleted_at, deletion_reason, archived_at, archived_by, archive_reason, restored_at, restored_by]
      filename_pattern: "{id}-{slug}.md"
      
    spec:
      dir: specifications
      id_prefix: spec
      counter_file: specs.json
      has_domain: false
      required_refs: [request_refs]
      reference_inheritance: {}
      creation:
        duplicate_check: true
        validate_request_refs: true
      state_cascades:
        archived:
          plan: archived
          task: archived
      required_fields: [id, label, state, summary, request_refs]
      optional_fields: [workflow, task_refs, standard_refs, spec_refs, meta, deleted, deleted_at, deletion_reason, archived_at, archived_by, archive_reason, restored_at, restored_by]
      filename_pattern: "{id}-{slug}.md"
      
    plan:
      dir: plans
      id_prefix: plan
      counter_file: plans.json
      has_domain: false
      required_refs: []
      reference_inheritance: {}
      creation:
        validate_request_refs: true
      required_fields: [id, label, state, summary]
      optional_fields: [workflow, spec_refs, request_refs, work_package_refs, standard_refs, meta, deleted, deleted_at, deletion_reason, archived_at, archived_by, archive_reason, restored_at, restored_by]
      filename_pattern: "{id}-{slug}.md"
      
    task:
      dir: tasks
      id_prefix: task
      counter_file: tasks.json
      has_domain: true
      required_refs: [spec]
      reference_inheritance:
        standard_refs:
          - field: spec_ref
            type: direct
          - field: parent_task_ref
            type: direct
      creation:
        validate_request_refs: true
      required_fields: [id, label, state, summary]
      optional_fields: [workflow, standard_refs, meta, deleted, deleted_at, deletion_reason, archived_at, archived_by, archive_reason, restored_at, restored_by, spec_ref, parent_task_ref, target, packet_ref, request_refs]
      filename_pattern: "{id}-{slug}.md"
      
    wp:
      dir: work-packages
      id_prefix: wp
      counter_file: wps.json
      has_domain: true
      required_refs: [plan]
      reference_inheritance:
        standard_refs:
          - field: plan_ref
            type: direct
          - field: task_refs
            type: recursive
            sub_inheritance:
              - field: standard_refs
              - field: spec_ref
                type: direct
                sub_inheritance:
                  - field: standard_refs
      required_fields: [id, label, state, summary, plan_ref]
      optional_fields: [workflow, standard_refs, meta, deleted, deleted_at, deletion_reason, archived_at, archived_by, archive_reason, restored_at, restored_by, task_refs]
      filename_pattern: "{id}-{slug}.md"
      
    standard:
      dir: standards
      id_prefix: standard
      counter_file: standards.json
      has_domain: false
      required_refs: []
      reference_inheritance: {}
      required_fields: [id, label, state, summary]
      optional_fields: [request_refs, task_refs, standard_refs, meta, deleted, deleted_at, deletion_reason, archived_at, archived_by, archive_reason, restored_at, restored_by]
      filename_pattern: "{id}-{slug}.md"
      
  dirs:
    base: docs/planning
    attachments: docs/planning/attachments
    indexes: .audiagentic/planning/indexes
    meta: .audiagentic/planning/meta
    extracts: .audiagentic/planning/extracts
    events: .audiagentic/planning/events
    claims: .audiagentic/planning/claims
    cache: .audiagentic/planning/cache
  reference_field_shapes:
    task_refs: rel_list
    work_package_refs: rel_list
  lifecycle:
    archived_state: archived
    superseded_state: superseded
    terminal_states: [archived, superseded, deleted]
    state_sets:
      request:
        standard:
          initial: [captured]
          active: [distilled]
          complete: [closed]
          terminal: [superseded, archived]
      spec:
        standard:
          initial: [draft, ready]
          active: [in_progress, blocked]
          complete: [done]
          terminal: [cancelled, archived]
      plan:
        standard:
          initial: [draft, ready]
          active: [in_progress, blocked]
          complete: [done]
          terminal: [cancelled, archived]
      task:
        standard:
          initial: [draft, ready]
          active: [in_progress, blocked]
          complete: [done]
          terminal: [cancelled, archived]
        review_heavy:
          initial: [draft, review, ready]
          active: [in_progress, blocked]
          complete: [done]
          terminal: [cancelled, archived]
      wp:
        standard:
          initial: [draft, ready]
          active: [in_progress, blocked, review]
          complete: [done]
          terminal: [cancelled, archived]
      standard:
        standard:
          initial: [ready]
          active: []
          complete: [done]
          terminal: [archived]
